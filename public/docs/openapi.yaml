  /api/v1/competitions:
    get:
      summary: 'Index Competitions'
      operationId: indexCompetitions
      description: 'Retrieve a collection of competitions. Filter by name, date, finished and trashed competitions.'
      parameters:
        -
          name: name
          in: query
          description: 'Retrieve competitions that include the value on their name'
          schema:
            type: string
        -
          name: start_date
          in: query
          description: 'Retrieve competitions that start on that date or after'
          schema:
            type: string
            format: date
        -
          name: end_date
          in: query
          description: 'Retrieve competitions that end before or on that date'
          schema:
            type: string
            format: date
        -
          name: is_finished
          in: query
          description: 'Retrieve active or finished competitions'
          schema:
            type: boolean
        -
          name: is_trashed
          in: query
          description: 'Retrieve stored or soft deleted models'
          schema:
            type: boolean
        -
          name: per_page
          in: query
          description: 'Amount of competitions to show per page (Default 15)'
          schema:
            type: integer
        -
          name: page
          in: query
          description: 'Page to show'
          schema:
            type: integer
      responses:
        200:
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Competition'
              examples:
                Example 1:
                  value:
                    data:
                      -
                        id: 2
                        name: 'Laborum voluptatibus quaerat voluptas soluta.'
                        description: 'Impedit aliquam nisi maxime ducimus.'
                        prize: 'Ipsam placeat nostrum enim molestiae.'
                        tools: 'Officiis est odio repudiandae inventore.'
                        maximum_number_of_teams: 44
                        total_number_of_teams: 0
                        registration_start_date: '2026-04-08'
                        registration_closing_date: '2026-04-22'
                        competition_is_finished: false
                        category: 'aspernatur perspiciatis'
                        admin: El
                        teams: []
                        modules:
                          - 'Fase 1: Planteamiento y GDD'
                          - 'Fase 2: Prototipo Jugable'
                          - 'Fase 3: Entrega Final'
        401:
          description: Unauthorized
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
              examples:
                Example 1:
                  value:
                    message: Unauthenticated
      tags:
        - Competitions
