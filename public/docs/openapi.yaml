  '/api/v1/handovers/{handover_id}':
    patch:
      summary: 'Submit Handover'
      operationId: submitHandover
      description: 'Submit an attachment for a pending handover.'
      parameters: []
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  message: 'Handover submitted successfully'
                  data:
                    id: 1
                    attachment: 'https://github.com/my-repo'
