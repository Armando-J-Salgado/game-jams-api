                  example: 'https://github.com/my-game-v2'
                is_delivered:
                  type: boolean
                  description: 'sometimes Whether the handover is delivered.'
                  example: true
                module_id:
                  type: integer
                  description: 'The <code>id</code> of an existing record in the modules table.'
                  example: 16
                team_id:
                  type: integer
                  description: 'The <code>id</code> of an existing record in the teams table.'
                  example: 16
                score:
                  type: integer
                  description: 'nullable Score of the handover (0-100).'
                  example: 100
                date_of_submission:
                  type: string
                  description: 'Must be a valid date. Must be a date before or equal to <code>today</code>.'
                  example: '2022-05-03'
              required:
                - title
    delete:
