        - Categories
    post:
      summary: 'Create Category'
      operationId: createCategory
      description: 'Store a newly created category in the database.'
      parameters: []
      responses:
        201:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  id: 1
                  name: Art
                properties:
                  id:
                    type: integer
                    example: 1
                  name:
                    type: string
                    example: Art
        401:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  message: Unauthenticated.
                properties:
                  message:
                    type: string
                    example: Unauthenticated.
        403:
