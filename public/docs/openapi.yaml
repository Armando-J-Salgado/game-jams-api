components:
  schemas:
    Competition:
      type: object
      properties:
        id:
          type: integer
          minimum: 1
          description: 'Unique identifier of the competition'
          example: 1
        name:
          type: string
          description: 'Name of the competition'
          example: 'ESEN 2026 GAME JAM FRIGHTS'
        description:
          type: string
          description: 'Detailed description of the competition'
          example: 'Come along and release your worst nightmares in this new edition.'
        prize:
          type: string
          description: 'Prize information for the competition'
          example: 'Earn a recognition as a Software Developer with your own official diploma.'
        tools:
          type: string
          description: 'Tools information for participants'
          example: 'Prepare to use itch.io and GODOT game engine'
        maximum_number_of_teams:
          type: integer
          minimum: 1
          description: 'Maximum number of teams allowed to participate'
          example: 10
        total_number_of_teams:
          type: integer
          minimum: 0
          description: 'Current number of enrolled teams'
          example: 2
        registration_start_date:
          type: string
          format: date
          description: 'Date when registration/competition starts'
          example: '2026-07-04'
        registration_closing_date:
          type: string
          format: date
          description: 'Date when the competition ends'
          example: '2026-07-06'
        competition_is_finished:
          type: boolean
          description: 'Indicates whether the competition has been marked as finished'
          example: false
        category:
          type: string
          description: 'Category name the competition belongs to'
          example: 'Action RPG'
        admin:
          type: string
          description: 'Name of the administrator/organizer'
          example: 'El'
        teams:
          type: array
          description: 'List of enrolled team names'
          items:
            type: string
          example: ['Boyer and Sons', 'Greenholt PLC']
        modules:
          type: array
          description: 'List of module titles for this competition'
          items:
            type: string
          example: ['Fase 1: Planteamiento y GDD', 'Fase 2: Prototipo Jugable', 'Fase 3: Entrega Final']
      required:
        - id
        - name
        - description
        - prize
        - tools
        - maximum_number_of_teams
        - total_number_of_teams
        - registration_start_date
        - registration_closing_date
        - competition_is_finished
        - category
        - admin
        - teams
        - modules
    Module:
      type: object
      properties:
        title:
          type: string
          description: 'Title of the module/phase'
          example: 'Fase 1: Planteamiento y GDD'
        description:
          type: string
          description: 'Description of the module objectives'
          example: 'Documentos de requerimientos y Game Design Document (GDD).'
        attachments:
          type: string
          nullable: true
          description: 'URL or links to module resources'
          example: 'https://itch.io/competitions/my-game'
        due_date:
          type: string
          format: date
          description: 'Deadline for this module'
          example: '2026-04-11'
        competition:
          type: object
          description: 'Competition this module belongs to'
          properties:
            id:
              type: integer
              minimum: 1
              example: 1
            name:
              type: string
              example: 'ESEN 2026 GAME JAM FRIGHTS'
        created_at:
          type: string
          format: date-time
          example: '2026-04-08T15:16:19.000000Z'
        updated_at:
          type: string
          format: date-time
          example: '2026-04-08T15:16:19.000000Z'
      required:
        - title
        - description
        - due_date
        - competition
    Category:
      type: object
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: 'Action RPG'
        created_at:
          type: string
          format: date-time
          example: '2026-04-08T15:16:19.000000Z'
        updated_at:
          type: string
          format: date-time
          example: '2026-04-08T15:16:19.000000Z'
    Handover:
      type: object
      properties:
        id:
          type: integer
          example: 1
        title:
          type: string
          example: 'Entrega Fase 1'
        attachment:
          type: string
          example: 'https://github.com/team/project'
        is_delivered:
          type: boolean
          example: true
        module_id:
          type: integer
          example: 1
        team_id:
          type: integer
          example: 1
        score:
          type: integer
          example: 95
        date_of_submission:
          type: string
          format: date-time
          example: '2026-04-08T15:16:19.000000Z'
        created_at:
          type: string
          format: date-time
          example: '2026-04-08T15:16:19.000000Z'
        updated_at:
          type: string
          format: date-time
          example: '2026-04-08T15:16:19.000000Z'
    Team:
      type: object
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: 'Los Programadores'
        admin_id:
          type: integer
          example: 1
        total_members:
          type: integer
          example: 3
        max_members:
          type: integer
          example: 5
        created_at:
          type: string
          format: date-time
          example: '2026-04-08T15:16:19.000000Z'
        updated_at:
          type: string
          format: date-time
          example: '2026-04-08T15:16:19.000000Z'
    User:
      type: object
      properties:
        id:
          type: integer
          example: 1
        username:
          type: string
          example: 'johndoe123'
        email:
          type: string
          example: 'john@example.com'
        name:
          type: string
          example: 'John'
        lastname:
          type: string
          example: 'Doe'
        dui:
          type: string
          example: '01234567-8'
        team_id:
          type: integer
          example: 1
        role_id:
          type: integer
          example: 2
        created_at:
          type: string
          format: date-time
          example: '2026-04-08T15:16:19.000000Z'
        updated_at:
          type: string
          format: date-time
          example: '2026-04-08T15:16:19.000000Z'
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
security:
  - bearerAuth: []
