                    $ref: '#/components/schemas/Competition'
              examples:
                Example 1:
                  value:
                    message: 'Competition created successfully'
                    competition:
                      id: 1
                      name: 'Game JAM 2099'
                      description: 'Utiliza tecnologÃ­as de desarrollo de videojuegos...'
                      prize: 'Premio en efectivo mÃ¡s diploma de participaciÃ³n'
                      tools: 'UsarÃ¡s Unity y desplegarÃ¡s en Games-Dev.com'
                      maximum_number_of_teams: 1
                      total_number_of_teams: 0
                      registration_start_date: '2022-10-12'
                      registration_closing_date: '2022-11-10'
                      competition_is_finished: true
                      category: 'Unity Amateur'
                      admin: 'Robert Downey Jr'
                      teams: []
                      modules: []
        401:
          description: Unauthorized
