        200:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  data:
                    -
                      id: 1
                      title: 'Entrega Fase 1'
                      is_delivered: true
                properties:
                  data:
                    type: array
                    example:
                      -
                        id: 1
                        title: 'Entrega Fase 1'
                        is_delivered: true
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                          example: 1
                        title:
                          type: string
                          example: 'Entrega Fase 1'
                        is_delivered:
                          type: boolean
                          example: true
        404:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  message: 'The specified team is not enrolled in this competition.'
                properties:
                  message:
                    type: string
                    example: 'The specified team is not enrolled in this competition.'
      tags:
        - Handovers
