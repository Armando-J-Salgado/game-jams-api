  /api/v1/categories:
    get:
      summary: 'List Categories'
      operationId: listCategories
      description: 'Display a listing of the categories.'
      parameters: []
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  data:
                    -
                      id: 1
                      name: 'Game Jam 2026'
                properties:
                  data:
                    type: array
                    example:
                      -
                        id: 1
                        name: 'Game Jam 2026'
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                          example: 1
                        name:
                          type: string
