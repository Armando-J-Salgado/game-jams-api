paths:
  /api/v1/auth/login:
    post:
      summary: 'User Login'
      operationId: userLogin
      description: 'Authenticates a user and returns a token.'
      parameters: []
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  status: success
                  messsage: 'Login successful'
                  token: 1|abcdef123456789...
                  user:
                    id: 1
                    name: Admin
                    email: admin@example.com
                properties:
                  status:
                    type: string
                    example: success
                  messsage:
                    type: string
                    example: 'Login successful'
                  token:
                    type: string
                    example: 1|abcdef123456789...
                  user:
                    type: object
                    properties:
                      id:
                        type: integer
                        example: 1
                      name:
                        type: string
                        example: Admin
                      email:
                        type: string
                        example: admin@example.com
        422:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  message: 'Email or password incorrect'
                properties:
                  message:
                    type: string
                    example: 'Email or password incorrect'
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  description: 'The user email.'
                  example: admin@example.com
                password:
                  type: string
                  description: 'The user password.'
                  example: password
              required:
                - email
                - password
      security: []
  /api/v1/auth/logout:
    post:
      summary: 'User Logout'
      operationId: userLogout
      description: 'Revokes the current access token.'
      parameters: []
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  status: success
                  message: 'Logout successful'
                properties:
                  status:
                    type: string
                    example: success
                  message:
                    type: string
                    example: 'Logout successful'
      tags:
        - Authentication
  /api/v1/auth/profile:
    get:
